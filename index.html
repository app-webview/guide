<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Locate a church</title>

<style>
/* ===== your original CSS kept intact ===== */
a,abbr,acronym,address,applet,article,aside,audio,b,big,blockquote,body,canvas,caption,center,cite,code,dd,del,details,dfn,div,dl,dt,em,embed,fieldset,figcaption,figure,footer,form,h1,h2,h3,h4,h5,h6,header,hgroup,html,i,iframe,img,input,ins,kbd,label,legend,li,mark,main,menu,nav,object,ol,output,p,pre,q,ruby,s,samp,section,small,span,strike,strong,sub,summary,sup,table,tbody,td,tfoot,th,thead,time,tr,tt,u,ul,var,video{-webkit-box-sizing:border-box;-moz-box-sizing:border-box;box-sizing:border-box;margin:0;padding:0;border:0}
article,aside,details,figcaption,figure,footer,header,hgroup,main,menu,nav,section{display:block}
nav ol,nav ul{list-style:none}
blockquote,q{quotes:none}
blockquote:after,blockquote:before,q:after,q:before{content:"";content:none}
table{border-spacing:0;border-collapse:collapse}
button,input[type=submit]{cursor:pointer}
*::selection{background:#f0f0f0;color:#0f0f0f;}
*::-moz-selection{background:#f0f0f0;color:#0f0f0f;}
html, body{width:100%;height:100%;margin:0;padding:0;}
body {display:block;position:relative;overflow:hidden;text-align:center;}
.background {position:fixed;top:0;right:0;bottom:0;left:0;z-index:1;}
.background_gradient {background:linear-gradient(170deg, #f1c40f, #ffa500); background-attachment:fixed;}
.background_image {background-size:cover; background-position:center center; background-repeat:no-repeat; background-attachment:fixed; background-image:url('static/images/bg/index_bg.jpg');}
.background_blur {filter:blur(5px);}
.overlay {position:fixed;top:0;right:0;bottom:0;left:0;z-index:10;overflow:auto;}
.overlay_dark {background-color:rgba(15, 15, 15, 0.45);}
.project {max-width:1200px;margin:0 auto;text-align:center;}
.project__name {max-width:480px;margin:8% auto 4%;font-family:Tahoma, Verdana, Arial, sans-serif;font-size:45px;color:#f0f0f0;text-align:center;}
.project__name_shadow{text-shadow:1px 1px 2px #0f0f0f;}
.project__list{display:inline-block;color:#f0f0f0;text-align:center;}
.project__item{position:relative;font-family:Georgia, Times, "Times New Roman", serif;font-size:25px;line-height:1;text-align:left;color:#f0f0f0;}
.project__link{display:inline-block;margin-bottom:20px;color:#f0f0f0;outline:none;text-decoration:none;white-space:nowrap;border-bottom:1px solid #f0f0f0;background:none;border:none;font:inherit;cursor:pointer;}
.project__link:hover{border-color:transparent;}
</style>
</head>
<body>

<!-- ===== Background ===== -->
<div class="background background_image background_blur"></div>

<div class="overlay overlay_dark">
  <main class="project">
    <h1 class="project__name project__name_shadow">Your Church Guide</h1>

    <ul class="project__list">
      <li class="project__item">
        <a class="project__link" href="gallery.html">Locate a church</a>
      </li>

      <li class="project__item">
        <button class="project__link" onclick="showVerse()">Daily verse</button>
      </li>

      <!-- Verse container hidden initially -->
      <li class="project__item" id="verse-container" style="display:none;">
        مزمور 46:‏1 <br>
        اللهُ لَنَا مَلْجَأٌ وَقُوَّةٌ، عَوْنُهُ مُتَوَافِرٌ لَنَا دَائِماً فِي الضِّيقَاتِ
      </li>
    </ul>
  </main>
</div>

<script>
// Toggle visibility of the verse and its bullet
function showVerse() {
  var verse = document.getElementById('verse-container');
  verse.style.display = (verse.style.display === 'none') ? 'list-item' : 'none';
}
</script>

</body>
</html>
